stages: [install, lint, build, deploy]

default:
  image: node:20-alpine

cache:
  key:
    files: [frontend/package-lock.json]
  paths: [frontend/.npm/, frontend/node_modules/]

frontend:install:
  stage: install
  script:
    - cd frontend
    - npm install
  artifacts:
    paths: [frontend/node_modules/]
    expire_in: 1h

frontend:lint:
  stage: lint
  needs: [frontend:install]
  script:
    - cd frontend
    - npm run lint
  allow_failure: true

frontend:build:
  stage: build
  needs: [frontend:install]
  script:
    - cd frontend
    - npm run build
  artifacts:
    paths: [frontend/dist/]
    expire_in: 1 week

backend:lint:
  stage: lint
  script:
    - cd backend
    - npm install
    - npm run lint
  allow_failure: true

pages:
  stage: deploy
  needs: [frontend:build]
  script:
    - mkdir -p public
    - cp -r frontend/dist/* public/
  artifacts:
    paths: [public]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
